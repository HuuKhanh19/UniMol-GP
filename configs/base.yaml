# Base configuration for CONAN Project

# Data settings
data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  split_ratio: [0.8, 0.1, 0.1]  # train/valid/test
  split_method: "scaffold"
  random_seed: 42

# UniMol settings
unimol:
  use_gpu: true
  conformer_num: 10
  
# Training settings (Step 1 - Gradient Descent)
training:
  epochs: 100
  batch_size: 32
  learning_rate: 0.0001
  early_stopping_patience: 10
  save_checkpoints: true

# EGGROLL settings (Step 2) - TUNED VALUES FOR FULL-BATCH
# KEY LEARNINGS:
# - sigma: 0.01 is correct for pretrained 47M param models (0.05 destroys weights!)
# - Full-batch provides more stable gradient estimates than mini-batch
# - rank_transform: critical for stability with noisy fitness
# - num_generations: 400 needed, model still improving at 200
# - lr_decay/sigma_decay: 0.99 helps convergence
#
eggroll:
  # Core parameters - TUNED
  population_size: 32     # N: balance gradient quality and speed
  rank: 16                # r: N*r=512 >= max_layer_dim for full-rank
  sigma: 0.01             # σ: KEEP SMALL for pretrained models!
  learning_rate: 0.1      # α: works well with rank_transform + decay

  # Training
  num_generations: 400    # Max generations (early stopping usually triggers)
  use_antithetic: true    # Mirrored sampling (±ε) for variance reduction
  eval_chunk_size: 64     # Forward pass chunk size (OOM prevention)

  # Fitness shaping - CRITICAL for stability
  normalize_fitness: true  # Z-score (fallback)
  rank_transform: true     # PRIMARY - prevents outlier domination
  centered_rank: true      # [-0.5, 0.5]

  # Decay & patience
  weight_decay: 0.0
  lr_decay: 0.99          # Gradual LR annealing
  sigma_decay: 0.99       # Gradual sigma annealing
  patience: 200

# GP settings (Step 3 Co-evolution)
gp:
  population_size: 50       # GP population size
  max_depth: 4              # Max tree depth
  tournament_size: 5        # Tournament selection size
  crossover_prob: 0.8       # Crossover probability
  mutation_prob: 0.2        # Mutation probability
  elitism: 3                # Elite individuals to keep
  input_dim: 512            # UniMol embedding dimension

# Experiment settings
experiment:
  output_dir: "experiments"
  log_level: "INFO"